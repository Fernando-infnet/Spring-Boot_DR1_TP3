spring.application.name=TP3
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.javax.persistence.schema-generation.scripts.action=create
# Write generated DDL to the build output, not to resources (avoid empty classpath schema.sql execution)
spring.jpa.properties.javax.persistence.schema-generation.scripts.create-target=target/schema.sql
# Disable Spring's automatic execution of SQL scripts from the classpath
spring.sql.init.mode=never
spring.h2.console.enabled=true
management.endpoints.web.exposure.include=health
